name: test

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  pytest:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Pytest
        run: pytest tests/ -q
